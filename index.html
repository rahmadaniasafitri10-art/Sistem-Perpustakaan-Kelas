<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Library X-4</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#f9a8d4,#fbcfe8);
min-height:100vh;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#be185d;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:2px solid #f9a8d4;
border-radius:12px;
outline:none;
font-size:15px;
}

input:focus{
border-color:#ec4899;
box-shadow:0 0 10px #f9a8d4;
}

button{
width:100%;
padding:12px;
background:#ec4899;
color:white;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
font-size:15px;
}

button:hover{
background:#db2777;
transform:scale(1.02);
}

.card{
background:#fdf2f8;
padding:15px;
border-radius:20px;
margin-top:15px;
border-left:8px solid #ec4899;
transition:0.3s;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card:hover{
transform:scale(1.03);
}

.card h2{
color:#be185d;
margin-bottom:5px;
}

.cover{
width:120px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.hapus{
margin-top:10px;
background:#ef4444;
}

.hapus:hover{
background:#dc2626;
}

.favoriteBtn{
margin-top:10px;
background:#f472b6;
}

.favoriteBtn:hover{
background:#ec4899;
}

.pinjamBtn{
margin-top:10px;
background:#c084fc;
}

.pinjamBtn:hover{
background:#a855f7;
}

.total{
margin-top:15px;
color:#be185d;
font-weight:bold;
font-size:18px;
}

.status{
margin-top:5px;
font-weight:bold;
}

.favoriteText{
color:#f59e0b;
font-weight:bold;
margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Digital Library X-4 🌸</h1>

<input type="text" id="judul" placeholder="Judul Buku">

<input type="text" id="penulis" placeholder="Nama Penulis">

<input type="text" id="kategori" placeholder="Kategori Buku">

<button onclick="tambahBuku()">
➕ Tambah Buku
</button>

<br><br>

<input type="text"
id="search"
placeholder="🔍 Cari Buku..."
onkeyup="cariBuku()">

<div class="total">
📚 Total Buku :
<span id="total">0</span>
</div>

<div id="listBuku"></div>

</div>

<script>

let buku = [

{
judul:"Laskar Pelangi",
penulis:"Andrea Hirata",
kategori:"Novel",
status:"Tersedia",
favorite:false,
cover:"https://cdn.gramedia.com/uploads/items/9789793062792_Laskar-Pelangi-New-Cover.jpg"
},

{
judul:"Harry Potter",
penulis:"J.K. Rowling",
kategori:"Fantasi",
status:"Dipinjam",
favorite:true,
cover:"https://m.media-amazon.com/images/I/81YOuOGFCJL.jpg"
},

{
judul:"Atomic Habits",
penulis:"James Clear",
kategori:"Pengembangan Diri",
status:"Tersedia",
favorite:false,
cover:"https://m.media-amazon.com/images/I/81wgcld4wxL.jpg"
},

{
judul:"Dilan 1990",
penulis:"Pidi Baiq",
kategori:"Romansa",
status:"Tersedia",
favorite:false,
cover:"https://i.imgur.com/jZQZ6GZ.jpeg"
},

{
judul:"Bumi",
penulis:"Tere Liye",
kategori:"Fantasi",
status:"Dipinjam",
favorite:true,
cover:"https://i.imgur.com/5KXQw7B.jpeg"
},

{
judul:"Negeri 5 Menara",
penulis:"Ahmad Fuadi",
kategori:"Pendidikan",
status:"Tersedia",
favorite:false,
cover:"https://i.imgur.com/7xJ6X8M.jpeg"
},

{
judul:"Rich Dad Poor Dad",
penulis:"Robert Kiyosaki",
kategori:"Keuangan",
status:"Tersedia",
favorite:false,
cover:"https://m.media-amazon.com/images/I/81bsw6fnUiL.jpg"
},

{
judul:"The Psychology of Money",
penulis:"Morgan Housel",
kategori:"Keuangan",
status:"Dipinjam",
favorite:true,
cover:"https://m.media-amazon.com/images/I/71TRUbzcvaL.jpg"
},

{
judul:"Ayat-Ayat Cinta",
penulis:"Habiburrahman El Shirazy",
kategori:"Religi",
status:"Tersedia",
favorite:false,
cover:"https://i.imgur.com/2X7Qw0M.jpeg"
},

{
judul:"One Piece",
penulis:"Eiichiro Oda",
kategori:"Komik",
status:"Dipinjam",
favorite:true,
cover:"https://i.imgur.com/jX9Q2gW.jpeg"
}

];

tampilkanBuku(buku);

function tambahBuku(){

let judul =
document.getElementById("judul").value;

let penulis =
document.getElementById("penulis").value;

let kategori =
document.getElementById("kategori").value;

if(judul=="" || penulis=="" || kategori==""){
alert("Isi semua data!");
return;
}

buku.push({
judul:judul,
penulis:penulis,
kategori:kategori,
status:"Tersedia",
favorite:false,
cover:"https://via.placeholder.com/120x180.png?text=Buku"
});

tampilkanBuku(buku);

document.getElementById("judul").value="";
document.getElementById("penulis").value="";
document.getElementById("kategori").value="";

}

function tampilkanBuku(data){

let list =
document.getElementById("listBuku");

list.innerHTML="";

data.forEach((item,index)=>{

list.innerHTML += `

<div class="card">

<img src="${item.cover}" class="cover">

<h2>${item.judul}</h2>

<p><b>✍ Penulis:</b>
${item.penulis}</p>

<p><b>📂 Kategori:</b>
${item.kategori}</p>

<p class="status">
📌 ${item.status}
</p>

<p class="favoriteText">
${item.favorite ? "⭐ Favorite" : ""}
</p>

<button class="favoriteBtn"
onclick="toggleFavorite(${index})">

💖 Favorite

</button>

<button class="pinjamBtn"
onclick="togglePinjam(${index})">

📚 Pinjam / Kembalikan

</button>

<button class="hapus"
onclick="hapusBuku(${index})">

🗑 Hapus Buku

</button>

</div>

`;

});

document.getElementById("total")
.innerText=data.length;

}

function hapusBuku(index){

buku.splice(index,1);

tampilkanBuku(buku);

}

function toggleFavorite(index){

buku[index].favorite =
!buku[index].favorite;

tampilkanBuku(buku);

}

function togglePinjam(index){

if(buku[index].status=="Tersedia"){

buku[index].status="Dipinjam";

}else{

buku[index].status="Tersedia";

}

tampilkanBuku(buku);

}

function cariBuku(){

let keyword =
document.getElementById("search")
.value
.toLowerCase();

let hasil = buku.filter(item =>
item.judul.toLowerCase()
.includes(keyword)
);

tampilkanBuku(hasil);

}

</script>

</body>
</html>
